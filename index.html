<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crazy Hunter Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen bg-[#0a0a0a] text-white selection:bg-orange-500/30">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer group" onclick="location.reload()">
                <div class="p-1.5 bg-white/5 rounded-lg group-hover:rotate-12 transition-transform overflow-hidden">
                    <img src="src/logo.webp" alt="Logo" class="w-8 h-8 object-contain" referrerpolicy="no-referrer">
                </div>
                <h1 class="text-xl font-bold tracking-tighter uppercase">CRAZYHUNTER<span class="text-orange-500">HUB</span></h1>
            </div>

            <div class="flex-1 max-w-md mx-8 hidden sm:block">
                <div class="relative group">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/40 group-focus-within:text-orange-500 transition-colors"></i>
                    <input
                        id="search-input"
                        type="text"
                        placeholder="Search games..."
                        class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/50 transition-all"
                    />
                </div>
            </div>

            <div class="flex items-center gap-4">
                <!-- Removed Request Game and Profile placeholder -->
            </div>
        </div>
    </header>

    <main id="main-container" class="max-w-7xl mx-auto px-4 py-8 transition-all duration-500">
        <!-- Grid View -->
        <div id="grid-view">
            <div class="mb-8">
                <h2 class="text-3xl font-bold mb-2">Featured Games</h2>
                <p class="text-white/50">Hand-picked unblocked favorites for you.</p>
            </div>
            <div id="games-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Games will be injected here -->
            </div>
        </div>

        <!-- Play View -->
        <div id="game-play" class="hidden flex flex-col min-h-[85vh]">
            <div class="flex items-center justify-between mb-6 px-2">
                <div class="flex items-center gap-4">
                    <button id="back-button" class="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 rounded-xl text-white/60 hover:text-white transition-all group">
                        <i data-lucide="chevron-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                        <span class="hidden sm:inline">Back to Hub</span>
                    </button>
                    <h2 id="game-title" class="text-2xl font-bold tracking-tight">Game Title</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button id="fullscreen-button" class="p-3 bg-white/5 hover:bg-orange-500 hover:text-black rounded-xl transition-all shadow-lg group" title="Toggle Fullscreen">
                        <i data-lucide="maximize-2" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    </button>
                    <button id="close-button" class="p-3 bg-white/5 hover:bg-red-500 hover:text-white rounded-xl transition-all shadow-lg group">
                        <i data-lucide="x" class="w-5 h-5 group-hover:rotate-90 transition-transform"></i>
                    </button>
                </div>
            </div>

            <div id="iframe-container" class="w-full aspect-video bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl relative group ring-1 ring-white/5">
                <iframe id="game-iframe" src="" class="w-full h-full border-none" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>

            <div id="game-info" class="mt-6 flex flex-col md:flex-row gap-8">
                <div class="flex-1">
                    <h3 id="about-title" class="text-2xl font-bold mb-4">About Game</h3>
                    <p id="about-description" class="text-white/60 leading-relaxed">Description goes here.</p>
                    <div class="mt-6 flex flex-wrap gap-2">
                        <span class="px-3 py-1 bg-white/5 rounded-full text-xs font-medium text-white/60">Arcade</span>
                        <span class="px-3 py-1 bg-white/5 rounded-full text-xs font-medium text-white/60">Classic</span>
                        <span class="px-3 py-1 bg-white/5 rounded-full text-xs font-medium text-white/60">Unblocked</span>
                    </div>
                </div>
                <div class="w-full md:w-72">
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6">
                        <h4 class="font-bold mb-4">Controls</h4>
                        <div class="space-y-3">
                            <div class="flex justify-between text-sm">
                                <span class="text-white/40">Move</span>
                                <span class="font-mono bg-white/10 px-2 rounded">WASD / Arrows</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-white/40">Action</span>
                                <span class="font-mono bg-white/10 px-2 rounded">Space</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-white/40">Pause</span>
                                <span class="font-mono bg-white/10 px-2 rounded">ESC</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 mt-20 py-12">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-2">
                <div class="p-1 bg-white/5 rounded-md overflow-hidden">
                    <img src="src/logo.webp" alt="Logo" class="w-6 h-6 object-contain" referrerpolicy="no-referrer">
                </div>
                <span class="font-bold tracking-tighter uppercase">CRAZYHUNTERHUB</span>
            </div>
            <div class="flex gap-8 text-sm text-white/40">
                <a href="#" class="hover:text-white transition-colors">Terms</a>
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">DMCA</a>
                <a href="#" class="hover:text-white transition-colors">Contact</a>
            </div>
            <p class="text-xs text-white/20">© 2026 Crazy Hunter Hub. All rights reserved.</p>
        </div>
    </footer>

    <script src="src/script.js"></script>
</body>
</html>
